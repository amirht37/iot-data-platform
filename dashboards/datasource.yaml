apiVersion: 1
datasources:
  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: iot_db  
    user: grafana
    isDefault: true
    secureJsonData:
      password: ${DB_PASSWORD} 
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1600
      database: iot_db 
      searchPath: "iot_clean, iot_raw, public"

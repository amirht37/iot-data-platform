version: '3.8'

services:
  # ==================== 1. THE VAULT (Postgres) ====================
  postgres:
    image: postgres:16
    container_name: iot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - iot_network

  # ==================== 2. THE BLUEPRINT (Airflow Anchor) ====================
  x-airflow-common: &airflow-common
    build:
      context: .
      dockerfile: Dockerfile.airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${AIRFLOW_DB}
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__SECRET_KEY: '${AIRFLOW_SECRET_KEY}'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    user: "50000:0"
    networks:
      - iot_network

  # ==================== 3. THE BUILDER (Airflow Init) ====================
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
      airflow db migrate && 
      airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password ${POSTGRES_PASSWORD}"

  # ==================== 4. THE INGESTOR (Flask) ====================
  flask-ingest:
    build: ./flask
    container_name: flask_iot
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    environment:
      # These MUST match what you have in your flask/app.py os.getenv calls
      DB_HOST: postgres
      DB_PORT: 5432
      IOT_DB: ${IOT_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - iot_network

  # ==================== 5. THE BRAIN (Airflow Web/Sched) ====================
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: always

  # ==================== 6. THE EYES (Grafana) ====================
  grafana:
    image: grafana/grafana-oss:latest
    container_name: iot-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASS}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards:/etc/grafana/provisioning/dashboards
      - ./dashboards/datasource.yaml:/etc/grafana/provisioning/datasources/datasource.yaml
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iot_network

networks:
  iot_network:
    driver: bridge

volumes:
  postgres_data:
  grafana_data:
